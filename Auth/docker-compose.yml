volumes:
  postgres_data:
    driver: local

networks:
  keycloak_network:
    driver: bridge

name: reccelog/auth

services:
  postgres:
    image: postgres:18
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/
    environment:
      POSTGRES_DB: ${DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD}
    networks:
      - keycloak_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    container_name: keycloak
    command: start-dev --import-realm
    volumes:
      - ./themes/custom-login-theme:/opt/keycloak/themes/custom-login-theme:ro
      - ./imports:/opt/keycloak/data/import:ro
    environment:
      KC_HOSTNAME: ${KC_HOST}
      KC_HOSTNAME_PORT: ${KC_HOST_PORT}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${DB}
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_USER_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_THEME: ${KC_THEME}
    ports:
      - 8082:${KC_HOST_PORT}
    depends_on:
      - postgres
    networks:
      - keycloak_network
