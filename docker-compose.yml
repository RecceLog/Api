name: reccelog

services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  database:
    container_name: database
    image: postgis/postgis:18-3.6
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    container_name: migrate
    build: .
    command: goose up
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=database port=5432 dbname=${DB_NAME} user=${DB_USERNAME} password=${DB_PASSWORD} sslmode=disable"
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure